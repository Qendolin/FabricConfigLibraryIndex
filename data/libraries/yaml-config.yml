    url: https://github.com/ukulib/ukulib
extraConfigTypes:
  - name: IDENTIFIER
    description: 'Identifier configuration values'
  - name: REGISTRY_ENTRY
    description: 'Registry entry configurations'
  - name: DATE_TIME
    description: 'Date-time configuration values'
extraFeatures:
  - CUSTOM_CONFIG_TYPES
  - CONSTRAINT
configFormats:
  - YAML
  - JSON5
  - TOML
  - HOCON
manualInitialization: YES
configMethod:
  typeOfClass: NORMAL
  memberType: STATIC
  waaas:
    - name: Builder
      methodDescription: 'typed using builder methods'
      examples:
        - builder.defineString("key", "value")
        - builder.defineBoolean("key", false)
        - builder.push("category")
uiMethod: AUTOMATIC
notes: []
source: https://github.com/DAQEM/YamlConfig
