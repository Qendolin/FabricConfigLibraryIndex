exampleConfigClass: |
  @ConfigEntries(includeAll = true)
  public class ConfigClass extends Config {
      public ConfigClass() {
          super(ConfigOptions
                  .mod("complete-config-example")
                  .fileHeader("This is an example config")
          );
      }

      private boolean exampleBoolean;
  }
