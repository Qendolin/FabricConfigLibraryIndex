# CarbonConfig library definition

id: carbon-config
name: Carbon Config
side: BOTH
modrinthSlug: carbon-config
type: BOTH
dependencies: []
extraConfigTypes: []
extraFeatures:
  - CUSTOM_CONFIG_TYPES
  - MOD_MENU_INTEGRATION
configFormats:
  - JSON
manualInitialization: YES
configMethod:
  typeOfClass: NORMAL
  memberType: INSTANCE
  waaas:
    - name: Builder
      methodDescription: 'typed using builder methods'
      examples:
        - section.addBool("key", false)
        - section.addInt("key", 0)
        - section.addString("key", "value")
uiMethod: NONE
notes: []
source: https://github.com/Carbon-Config-Project/CarbonConfigLib
exampleConfigClass: |
  public class ConfigClass {
    public static ConfigHandler CONFIG;
    public static ConfigSection SECTION;
    public static BoolValue EXAMPLE_BOOLEAN;

    static {
      Config config = new Config("example");
      ConfigSection section = config.add("general");
      EXAMPLE_BOOLEAN = section.addBool("example_key", false);
      CONFIG = CarbonConfig.CONFIGS.createConfig(config);
      CONFIG.register();
    }
  }
