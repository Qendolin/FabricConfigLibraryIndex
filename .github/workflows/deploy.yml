name: Deploy CSR Frontend

on:
  push:
    branches:
      - csr-frontend

# Concurrency group ensures only one deployment to Pages runs at a time
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required to write to Pages
      id-token: write # Required to verify the deployment source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Uploads the static files directly from the root of your repository [1]
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
